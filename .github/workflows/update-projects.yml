name: Update Featured Projects

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  update:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch deployed repos and update README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          USERNAME="${{ github.repository_owner }}"

          # fetch repos that have a live site URL set (homepage field)
          REPOS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/users/$USERNAME/repos?per_page=100&sort=stars&direction=desc" \
            | python3 -c "
          import sys, json
          repos = json.load(sys.stdin)
          # only repos with a homepage URL (live deployed site), exclude forks and profile repo
          deployed = [r for r in repos if r.get('homepage') and not r['fork'] and r['name'] != '$USERNAME']
          deployed.sort(key=lambda r: r['stargazers_count'], reverse=True)
          top = deployed[:3]
          for r in top:
              print(f\"{r['name']}|{r['homepage']}\")
          ")

          # generate pin card HTML
          CARDS=""
          COUNT=0
          for ENTRY in $REPOS; do
            REPO=$(echo "$ENTRY" | cut -d'|' -f1)
            URL=$(echo "$ENTRY" | cut -d'|' -f2)
            COUNT=$((COUNT + 1))

            # deployed badge
            BADGE=""
            if [ -n "$URL" ]; then
              BADGE="<br><sub><a href=\"$URL\">🔗 live site</a></sub>"
            fi

            if [ $COUNT -le 2 ]; then
              CARDS="$CARDS
          <tr>
            <td width=\"50%\">
              <a href=\"https://github.com/$USERNAME/$REPO\">
                <img src=\"https://github-readme-stats-eight-theta.vercel.app/api/pin/?username=$USERNAME\&repo=$REPO\&theme=tokyonight\&hide_border=true\" width=\"100%\"/>
              </a>$BADGE
            </td>"
            else
              CARDS="$CARDS
            <td width=\"50%\" align=\"center\">
              <a href=\"https://github.com/$USERNAME/$REPO\">
                <img src=\"https://github-readme-stats-eight-theta.vercel.app/api/pin/?username=$USERNAME\&repo=$REPO\&theme=tokyonight\&hide_border=true\" width=\"100%\"/>
              </a>$BADGE
            </td>
          </tr>"
            fi
            if [ $COUNT -eq 2 ]; then
              CARDS="$CARDS
          </tr>"
            fi
          done

          TABLE="<table>$CARDS
          </table>"

          TABLE_ESC=$(printf '%s\n' "$TABLE" | sed 's/[\/&]/\\&/g')
          sed -i '/<!-- PROJECTS:start -->/,/<!-- PROJECTS:end -->/c\<!-- PROJECTS:start -->\n'"$TABLE_ESC"'\n<!-- PROJECTS:end -->' README.md

      - name: Commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || {
            git add README.md
            git commit -m "Auto-update featured projects"
            git push
          }
