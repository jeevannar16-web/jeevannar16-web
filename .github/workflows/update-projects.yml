name: Update Featured Projects

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  update:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch top 3 repos and update README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          USERNAME="${{ github.repository_owner }}"

          # fetch repos sorted by stars, get top 3
          REPOS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/users/$USERNAME/repos?per_page=100&sort=stars&direction=desc" \
            | python3 -c "
          import sys, json
          repos = json.load(sys.stdin)
          repos = [r for r in repos if not r['fork'] and r['name'] != '$USERNAME']
          repos.sort(key=lambda r: r['stargazers_count'], reverse=True)
          top = repos[:3]
          for r in top:
              print(r['name'])
          ")

          # generate pin card HTML
          CARDS=""
          COUNT=0
          for REPO in $REPOS; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -le 2 ]; then
              CARDS="$CARDS
          <tr>
            <td width=\"50%\">
              <a href=\"https://github.com/$USERNAME/$REPO\">
                <img src=\"https://github-readme-stats-eight-theta.vercel.app/api/pin/?username=$USERNAME\&repo=$REPO\&theme=tokyonight\&hide_border=true\" width=\"100%\"/>
              </a>
            </td>"
            else
              CARDS="$CARDS
            <td width=\"50%\" align=\"center\">
              <a href=\"https://github.com/$USERNAME/$REPO\">
                <img src=\"https://github-readme-stats-eight-theta.vercel.app/api/pin/?username=$USERNAME\&repo=$REPO\&theme=tokyonight\&hide_border=true\" width=\"100%\"/>
              </a>
            </td>
          </tr>"
            fi
            if [ $COUNT -eq 2 ]; then
              CARDS="$CARDS
          </tr>"
            fi
          done

          # wrap in table
          TABLE="<table>$CARDS
          </table>"

          # escape for sed
          TABLE_ESC=$(printf '%s\n' "$TABLE" | sed 's/[\/&]/\\&/g')

          # replace between markers
          sed -i '/<!-- PROJECTS:start -->/,/<!-- PROJECTS:end -->/c\<!-- PROJECTS:start -->\n'"$TABLE_ESC"'\n<!-- PROJECTS:end -->' README.md

      - name: Commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || {
            git add README.md
            git commit -m "Auto-update featured projects"
            git push
          }
