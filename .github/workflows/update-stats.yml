name: Update Stats

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Debug token & API access
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Token length: ${#GH_TOKEN}"
          echo "Testing REST API..."
          curl -s -w "\nHTTP %{http_code}" "https://api.github.com/user" -H "Authorization: token $GH_TOKEN" | head -5
          echo ""
          echo "Testing GraphQL..."
          curl -s -X POST "https://api.github.com/graphql" \
            -H "Authorization: bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ viewer { login } }"}' | head -3

      - name: Generate stats from GitHub API
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/generate_stats.py

      - name: Update project cards
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/update_projects.py

      - name: Verify generated SVGs
        run: |
          echo "=== github-stats.svg ==="
          head -3 stats/github-stats.svg
          echo ""
          echo "=== streak.svg ==="
          head -3 stats/streak.svg
          echo ""
          echo "=== top-langs.svg ==="
          head -3 stats/top-langs.svg

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/
          git diff --staged --quiet || git commit -m "chore: update profile stats [skip ci]" && git push
